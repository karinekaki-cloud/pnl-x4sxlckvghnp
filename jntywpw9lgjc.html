  <div class="cadeia">&#128274;</div>
  <h1>Painel</h1>
  <p>Digite a senha para ver o painel.</p>
  <form id="frm">
    <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" autofocus>
    <button type="submit" id="btn">Abrir painel</button>
  </form>
  <div class="erro" id="erro"></div>
</div>
<script>
(function(){
  var gate = document.getElementById('gate');
  var frm = document.getElementById('frm');
  var erro = document.getElementById('erro');
  var btn = document.getElementById('btn');
  function b64ToBytes(b64){ var bin = atob(b64); var a = new Uint8Array(bin.length); for(var i=0;i<bin.length;i++){ a[i]=bin.charCodeAt(i);} return a; }
  frm.addEventListener('submit', function(e){
    e.preventDefault();
    erro.textContent = '';
    btn.disabled = true; btn.textContent = 'Abrindo...';
    var senha = document.getElementById('senha').value;
    var salt = b64ToBytes(gate.dataset.salt);
    var iv = b64ToBytes(gate.dataset.iv);
    var ct = b64ToBytes(gate.dataset.ct);
    var iter = parseInt(gate.dataset.iter, 10);
    var enc = new TextEncoder();
    crypto.subtle.importKey('raw', enc.encode(senha), 'PBKDF2', false, ['deriveKey'])
      .then(function(km){
        return crypto.subtle.deriveKey(
          {name:'PBKDF2', salt:salt, iterations:iter, hash:'SHA-256'},
          km, {name:'AES-CBC', length:256}, false, ['decrypt']);
      })
      .then(function(key){
        return crypto.subtle.decrypt({name:'AES-CBC', iv:iv}, key, ct);
      })
      .then(function(buf){
        var html = new TextDecoder().decode(buf);
        document.open(); document.write(html); document.close();
      })
      .catch(function(){
        erro.textContent = 'Senha incorreta. Tente de novo.';
        btn.disabled = false; btn.textContent = 'Abrir painel';
      });
  });
})();
</script>
